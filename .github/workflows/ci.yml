name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Unit tests all features
        run: cargo test --all-features

      - name: Generic examples
        run: cargo check --examples

      - name: Generic examples all features
        run: cargo check --all-features --examples

      - name: Package verification
        run: cargo package

      - name: STM32 example binaries
        working-directory: embassy-stm32g030f6-examples
        run: cargo check --bins --target thumbv6m-none-eabi
